steps:
  - task: AzureCLI@2
    inputs:
      azureSubscription: '$(ado_service_connection_rg)'
      scriptType: 'ps'
      addSpnToEnvironment: true
      scriptLocation: 'inlineScript'
      inlineScript: |
          if (![string]::IsNullOrEmpty($env:servicePrincipalId)) {
            $SUBSCRIPTION_ID = az account show --query 'id' --output tsv
            $TENANT_ID = az account show --query 'tenantId' --output tsv
            $CLIENT_ID = $env:servicePrincipalId
            $CLIENT_SECRET = $env:servicePrincipalKey
          } else {
            $SUBSCRIPTION_ID = ''
            $TENANT_ID = ''
            $CLIENT_ID = ''
            $CLIENT_SECRET = ''
          }
          
          # Define environment variables
          Write-Host "##vso[task.setvariable variable=TENANT_ID]'$TENANT_ID'"
          Write-Host "##vso[task.setvariable variable=CLIENT_ID]'$CLIENT_ID'"
          Write-Host "##vso[task.setvariable variable=CLIENT_SECRET]'$CLIENT_SECRET'"